<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>石焼き芋パラサウロロフス</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; background: #f7e7b5; font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif; color: #2b241c; text-align: center; overscroll-behavior: none; }
    body { padding: 14px; }
    h1 { font-size: clamp(20px, 6vw, 34px); margin: 8px 0 6px; }
    #info { font-size: clamp(14px, 4vw, 18px); margin: 8px auto 12px; max-width: 760px; }
    #wrap { width: min(96vw, 860px); margin: 0 auto; }
    canvas { width: 100%; height: auto; display: block; background: #fff8df; border: 3px solid #2b241c; border-radius: 16px; box-shadow: 0 8px 0 rgba(0,0,0,.16); touch-action: manipulation; }
    #scoreArea { font-size: clamp(18px, 5vw, 26px); margin: 14px 0 10px; font-weight: 800; }
    button { min-width: 180px; padding: 14px 22px; font-size: clamp(18px, 5vw, 24px); font-weight: 800; border: 0; border-radius: 999px; color: #fff; background: #ff8500; box-shadow: 0 6px 0 #bd5b00; cursor: pointer; }
    button:active { transform: translateY(4px); box-shadow: 0 2px 0 #bd5b00; }
    #hint { font-size: 14px; opacity: .8; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>石焼き芋パラサウロロフス</h1>
  <div id="info">音に合わせて、画面をタップ。やきいもをお客さんに渡そう。</div>
  <div id="wrap"><canvas id="gameCanvas" width="900" height="420"></canvas></div>
  <div id="scoreArea">スコア: <span id="score">0</span></div>
  <button id="startButton">スタート</button>
  <div id="hint">スマホ: タップ / PC: スペースキー</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const startButton = document.getElementById('startButton');
  const totalBeats = 16;
  const beatInterval = 760;
  const travelTime = 1600;
  let beatTimes = [], results = [], totalScore = 0, gameRunning = false, raf = 0;
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq = 880, dur = 0.055, gain = 0.08) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square'; osc.frequency.value = freq;
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur);
  }

  function startGame() {
    initAudio();
    cancelAnimationFrame(raf);
    beatTimes = []; results = []; totalScore = 0; scoreEl.textContent = '0';
    const first = performance.now() + 1800;
    for (let i = 0; i < totalBeats; i++) beatTimes.push({ time: first + i * beatInterval, pressed: false, ticked: false });
    gameRunning = true;
    startButton.textContent = 'リスタート';
    raf = requestAnimationFrame(update);
  }

  function judge() {
    if (!gameRunning) return;
    const now = performance.now();
    let bestDiff = Infinity, best = -1;
    beatTimes.forEach((bt, i) => {
      if (bt.pressed) return;
      const d = Math.abs(now - bt.time);
      if (d < bestDiff) { bestDiff = d; best = i; }
    });
    let text = 'ミス', score = 0, freq = 190;
    if (best >= 0 && bestDiff <= 280) {
      beatTimes[best].pressed = true;
      if (bestDiff <= 80) { text = 'パーフェクト！'; score = 100; freq = 1100; }
      else if (bestDiff <= 170) { text = 'グッド！'; score = 60; freq = 820; }
      else { text = 'セーフ'; score = 30; freq = 560; }
      totalScore += score;
    }
    results.unshift({ text, at: now });
    if (results.length > 5) results.length = 5;
    scoreEl.textContent = totalScore;
    beep(freq);
    if (navigator.vibrate) navigator.vibrate(score ? 20 : 45);
  }

  function drawDino(x, y, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale); ctx.lineWidth = 4; ctx.strokeStyle = '#1f1a14';
    ctx.fillStyle = '#4ba58d'; round(-70, -45, 120, 65, 35); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(42, -56, 36, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#e24e38'; ctx.beginPath(); ctx.moveTo(38,-88); ctx.quadraticCurveTo(-8,-128,-34,-88); ctx.lineTo(12,-72); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(56,-65,7,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1f1a14'; ctx.beginPath(); ctx.arc(58,-64,3,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1f1a14'; ctx.beginPath(); ctx.arc(60,-45,12,0,Math.PI*.8); ctx.stroke();
    ctx.fillStyle = '#7a386f'; round(-36, 0, 62, 45, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffd35c'; ctx.beginPath(); ctx.ellipse(84,-24,22,16,-.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#7a2e52'; ctx.beginPath(); ctx.ellipse(74,-13,24,18,-.3,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.restore();
  }
  function round(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function draw(now) {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0,0,w,h);
    const g = ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'#ffefaa'); g.addColorStop(1,'#f8c46d'); ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
    ctx.fillStyle = '#d88935'; ctx.beginPath(); ctx.moveTo(0,230); ctx.lineTo(220,130); ctx.lineTo(420,230); ctx.lineTo(570,150); ctx.lineTo(760,230); ctx.lineTo(900,160); ctx.lineTo(900,420); ctx.lineTo(0,420); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#5b3820'; round(18,145,210,150,12); ctx.fill(); ctx.strokeStyle='#24180f'; ctx.lineWidth=4; ctx.stroke();
    ctx.fillStyle = '#b54425'; round(30,115,190,55,6); ctx.fill(); ctx.stroke(); ctx.fillStyle='#fff'; ctx.font='900 34px sans-serif'; ctx.fillText('石焼き芋',58,154);
    drawDino(155,270,1.35);
    ctx.fillStyle='#2b241c'; ctx.font='900 22px sans-serif'; ctx.fillText('あつあつの やきいもだよ〜',245,110);
    ctx.strokeStyle='#2b241c'; ctx.lineWidth=3; ctx.strokeRect(235,68,270,58);

    const laneY = 335, startX = 260, targetX = 720;
    ctx.strokeStyle = '#2b241c'; ctx.lineWidth = 8; ctx.beginPath(); ctx.moveTo(startX,laneY); ctx.lineTo(850,laneY); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(targetX,laneY,40,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#2b241c'; ctx.lineWidth=5; ctx.stroke();
    ctx.fillStyle = '#2b241c'; ctx.font='900 34px sans-serif'; ctx.fillText('TAP',targetX-34,laneY+12);

    beatTimes.forEach(bt => {
      const p = (now - (bt.time - travelTime)) / travelTime;
      if (p < 0 || p > 1.15 || bt.pressed) return;
      const x = startX + p * (targetX - startX);
      ctx.fillStyle = '#8b3b66'; ctx.beginPath(); ctx.ellipse(x,laneY,26,18,-.2,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#2b241c'; ctx.lineWidth=3; ctx.stroke();
      ctx.fillStyle='#ffd35c'; ctx.beginPath(); ctx.ellipse(x+6,laneY-9,18,12,-.2,0,Math.PI*2); ctx.fill();
    });
    ctx.fillStyle='#2b241c'; ctx.font='900 30px sans-serif'; results.forEach((r,i)=>ctx.fillText(r.text, 610, 70 + i*34));
  }

  function update(now) {
    beatTimes.forEach(bt => { if (!bt.ticked && now >= bt.time) { bt.ticked = true; beep(330, .035, .035); } });
    draw(now);
    const last = beatTimes.length ? beatTimes[beatTimes.length-1].time : 0;
    if (gameRunning && now < last + 1400) raf = requestAnimationFrame(update);
    else if (gameRunning) { gameRunning = false; results.unshift({ text: '終了！', at: now }); draw(now); }
  }

  canvas.addEventListener('pointerdown', e => { e.preventDefault(); judge(); });
  document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); judge(); } });
  startButton.addEventListener('click', startGame);
  draw(performance.now());
})();
</script>
</body>
</html>
